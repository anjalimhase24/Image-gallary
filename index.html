<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallary</title>
  <style>
    .main-img {
      width: 500px;
      height: 300px;
      border-radius: 10px;
    }

    .gallary-container {
      width: fit-content;
      margin: 10px auto;
      display: flex;
      align-items: center;
    }

    .btn-slide {
      display: flex;
      margin-right: 10px;
      height: 30px;
      width: 30px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid rgb(21, 23, 21);
    }

    .preview-img{
      height: 100px;
    }

    .gallary-prerview{
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="gallary-container">
    <span class="btn-slide btn-left" onclick="slideLeft()"><b>&lt;</b></span>
    <img src="https://plus.unsplash.com/premium_photo-1686310335921-38acc0679321?q=80&w=2075" alt="image-1"
      class="main-img" id="mainImage" />

    <span class=" btn-slide btn-right" onclick="slideRight()"><b>&gt;</b></span>
  </div>
  <div class="gallary-prerview" id="gallary-preview"></div>

  <script>
    const IMAGES = [
      "https://plus.unsplash.com/premium_photo-1686310335921-38acc0679321?q=80&w=2075",
      "https://images.unsplash.com/photo-1549366021-9f761d450615?q=80&w=706",
      "https://images.unsplash.com/photo-1510272839903-5112a2e44bc6?q=80&w=1170",
      "https://images.unsplash.com/photo-1544211393-7fdc8fca9f4f?q=80&w=689",
      "https://images.unsplash.com/photo-1678371623228-364d259d4093?q=80&w=1333",
      "https://plus.unsplash.com/premium_photo-1686507726610-a9b1e6571a1a?q=80&w=918",
      "https://plus.unsplash.com/premium_photo-1686507182010-879f2f781e9b?q=80&w=976",
      "https://plus.unsplash.com/premium_photo-1685783757091-80707f8f37ba?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      "https://images.unsplash.com/photo-1629355521886-286bdeab6f73?q=80&w=627&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    ];

    let currentIndex = 0;

    function showImageIndex() {
      const imgElement = document.getElementById("mainImage");
      imgElement.src = IMAGES[currentIndex];
    }

    function slideLeft() {
      if (currentIndex <= 0) {
        currentIndex = IMAGES.length - 1;
      }
      else {
        currentIndex--;
      }
      showImageIndex();
    }
    function slideRight() {
      if (currentIndex >= IMAGES.length - 1) {
        currentIndex = 0;
      }
      else {
        currentIndex++;
      }
      showImageIndex();
    }

    function showImage(Index) {
      currentIndex = Index;
      showImageIndex();
    }


    function createGallaryPreview() {
      const gallaryPreviewContainer = document.getElementById("gallary-preview");

      gallaryPreviewContainer.innerHTML = "";
      for (let i = 0; i < IMAGES.length; i++) {
        const currentImage = IMAGES[i];
        gallaryPreviewContainer.innerHTML += `<img src='${IMAGES[i]}' class='preview-img'
        onclick = 'showImage(${i})'
        />`;

      }
    }

    createGallaryPreview();
  </script>
</body>
</html>
