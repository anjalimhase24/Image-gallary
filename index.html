<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallary</title>
  <style>
    .main-img {
      width: 500px;
      height: 300px;
      border-radius: 10px;
      object-fit: cover;
    }

    .gallary-container {
      width: fit-content;
      margin: 10px auto;
      display: flex;
      align-items: center;
    }

    .btn-slide {
      display: flex;
      margin-right: 10px;
      height: 30px;
      width: 30px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid rgb(21, 23, 21);
    }

    .preview-img{
      height: 100px;
      margin: 0 5px;
      cursor: pointer;
      border-radius: 10px;
    }

    .gallary-prerview{
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 30px;
      width: 60%;
      margin: 0 auto;
      overflow-x: scroll;
    }

    .image-info {
      width: 500px;
      margin: 12px auto 0;
      text-align: left;
      font-family: Arial, sans-serif;
    }

    .image-title {
      margin: 0;
      font-size: 20px;
    }

    .image-description {
      margin-top: 8px;
      color: #444;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="gallary-container">
    <span class="btn-slide btn-left" onclick="slideLeft()"><b>&lt;</b></span>
    <img src="https://plus.unsplash.com/premium_photo-1686310335921-38acc0679321?q=80&w=2075" alt="image-1"
      class="main-img" id="mainImage" />

    <span class=" btn-slide btn-right" onclick="slideRight()"><b>&gt;</b></span>
  </div>
  <div class="image-info">
    <h3 class="image-title" id="imageTitle"></h3>
    <p class="image-description" id="imageDescription"></p>
  </div>
  <div class="gallary-prerview" id="gallary-preview"></div>

  <script>

    const IMAGES =[
      {

      },

      {

      },
      {

        title: "Tiger is a wild animal",

        title: "Tiger is a wild animal",

      },
      {
        url: "https://images.unsplash.com/photo-1629355521886-286bdeab6f73?q=80&w=627&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
        title: "Tiger is a wild animal",
        discription:" Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate."      
      } ,

    ]


    let currentIndex = 0;

    function showImageIndex() {
      const imgElement = document.getElementById("mainImage");
      const titleElement = document.getElementById("imageTitle");
      const descriptionElement = document.getElementById("imageDescription");
      const currentImage = IMAGES[currentIndex];

      imgElement.src = currentImage.url;
      imgElement.alt = currentImage.title;
      titleElement.innerText = currentImage.title;
      descriptionElement.innerText = currentImage.discription;
    }

    function slideLeft() {
      if (currentIndex <= 0) {
        currentIndex = IMAGES.length - 1;
      }
      else {
        currentIndex--;
      }
      showImageIndex();
    }
    function slideRight() {
      if (currentIndex >= IMAGES.length - 1) {
        currentIndex = 0;
      }
      else {
        currentIndex++;
      }
      showImageIndex();
    }

    function showImage(Index) {
      currentIndex = Index;
      showImageIndex();
    }


    function createGallaryPreview() {
      const gallaryPreviewContainer = document.getElementById("gallary-preview");

      gallaryPreviewContainer.innerHTML = "";
      for (let i = 0; i < IMAGES.length; i++) {
        const currentImage = IMAGES[i];
        gallaryPreviewContainer.innerHTML += `<img src='${currentImage.url}' class='preview-img'
        alt='${currentImage.title}'
        onclick = 'showImage(${i})'
        />`;

      }
    }

    createGallaryPreview();
    showImageIndex();
  </script>
</body>
</html>
