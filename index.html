<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Gallery</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

h1 {
  margin: 20px;
}

button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  transition: 0.3s;
}

.card:hover img {
  transform: scale(1.1);
}

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.lightbox img {
  max-width: 80%;
  max-height: 80%;
}
</style>

</head>
<body>

<h1>🛍️ Image Gallery</h1>

<button onclick="filterItems('all')">All</button>
<button onclick="filterItems('nature')">cloth</button>
<button onclick="filterItems('animals')">shoes
    
</button>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg">
</div>

<script>
const items = [
  { src: "./imges/cloth-img-img.jpg", category: "nature" },
  { src: "./imges/cloth-img.jpg", category: "animals" },
  { src: "./imges/men-shoes-img.jpg", category: "nature" },
  { src: "./imges/women-shoes-img.jpg", category: "animals" },
  { src: "https://picsum.photos/id/1055/400/300", category: "nature" }
];

function displayItems(filter) {
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  const filtered = filter === "all"
    ? items
    : items.filter(item => item.category === filter);

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `<img src="${item.src}" onclick="openLightbox('${item.src}')">`;
    gallery.appendChild(div);
  });
}

function filterItems(category) {
  displayItems(category);
}

function openLightbox(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightboxImg").src = src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

displayItems("all");
</script>

</body>
</html>
